services:
  - type: web
    name: universal-downloader-bot
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: MAX_FILE_SIZE
        value: 50
      - key: RATE_LIMIT
        value: 10
      - key: DEBUG
        value: false
    autoDeploy: true
