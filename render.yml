services:
  - type: worker
    name: universal-downloader-bot
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      apt-get update && apt-get install -y ffmpeg
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bot-db
          property: connectionString
      - key: MAX_FILE_SIZE
        value: 50
      - key: RATE_LIMIT
        value: 10
      - key: DEBUG
        value: false
    buildFilter:
      paths:
        - bot.py
        - config.py
        - database.py
        - downloader.py
        - keyboards.py
        - utils.py
        - requirements.txt
    autoDeploy: true

databases:
  - name: bot-db
    databaseName: bot_db
    user: bot_user
